<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – CQVai</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-left">
    <div class="auth-brand">
      <i class="fa-solid fa-book-open-reader"></i>
      <h1CQVai</h1>
    </div>
    <h2>Admin Portal</h2>
    <p>Manage questions, answers and content for SSC, HSC & Admission students across Bangladesh.</p>
    <div class="auth-features">
      <div><i class="fa-solid fa-check-circle"></i> Post New Questions</div>
      <div><i class="fa-solid fa-check-circle"></i> Manage Q&A Database</div>
      <div><i class="fa-solid fa-check-circle"></i> Edit & Delete Content</div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-card-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <h3>Admin Sign In</h3>
      <p class="auth-subtitle">Only authorized administrators can access this panel.</p>

      <div id="loginError" class="auth-error" style="display:none;">
        <i class="fa-solid fa-triangle-exclamation"></i> <span id="loginErrorMsg"></span>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" id="adminEmail" placeholder="admin@shikhobd.com" autocomplete="off"/>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-lock"></i> Password</label>
        <div class="pw-wrap">
          <input type="password" id="adminPass" placeholder="••••••••"/>
          <button type="button" class="pw-toggle" id="pwToggle"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>

      <button class="btn-primary full" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>

      <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Site</a>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="app.js" type="module"></script>

<script type="module">
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  window.addEventListener("firebaseReady", () => {
    const app = window._firebaseApp;
    const auth = getAuth(app);

    const loginBtn = document.getElementById("loginBtn");
    const errBox = document.getElementById("loginError");
    const errMsg = document.getElementById("loginErrorMsg");

    // Password Visibility Toggle
    document.getElementById("pwToggle").addEventListener("click", () => {
      const passInput = document.getElementById("adminPass");
      const icon = document.querySelector("#pwToggle i");
      
      if (passInput.type === "password") {
        passInput.type = "text";
        icon.className = "fa-solid fa-eye-slash";
      } else {
        passInput.type = "password";
        icon.className = "fa-solid fa-eye";
      }
    });

    // Login Function
    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("adminEmail").value.trim();
      const password = document.getElementById("adminPass").value;

      errBox.style.display = "none";
      loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
      loginBtn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "admin.html";   // Redirect to admin dashboard
      } catch (error) {
        console.error(error);
        let message = "Invalid email or password.";
        if (error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
          message = "Invalid email or password.";
        } else if (error.code === "auth/invalid-email") {
          message = "Please enter a valid email address.";
        }
        errMsg.textContent = message;
        errBox.style.display = "flex";
      } finally {
        loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
        loginBtn.disabled = false;
      }
    });

    // Login on Enter key
    document.getElementById("adminPass").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });
  });
</script>
</body>
</html>
